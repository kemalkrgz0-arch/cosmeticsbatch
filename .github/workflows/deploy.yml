name: Deploy to VPS

# Auto-deploy on every push to main; also runnable by hand from the Actions tab.
on:
  push:
    branches: [main]
  workflow_dispatch:

# Never let two deploys run at once; a newer push supersedes an in-flight one.
concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: SSH build & restart on the VPS
        uses: appleboy/ssh-action@v1.2.0
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          SUBMISSION_NOTIFY_EMAIL: contact@cosmeticsbatch.com
          SUBMISSION_FROM_EMAIL: Cosmetics Batch <contact@cosmeticsbatch.com>
          CF_ACCESS_AUD: ${{ secrets.CF_ACCESS_AUD }}
          # Public tenant URL (not a credential). Keeping it explicit prevents
          # an accidentally blank secret from disabling origin validation.
          CF_ACCESS_TEAM_DOMAIN: https://calm-sun-fd60.cloudflareaccess.com
          REVIEWER_EMAILS: ${{ secrets.REVIEWER_EMAILS }}
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          port: ${{ secrets.SSH_PORT || 22 }}
          command_timeout: 30m
          envs: RESEND_API_KEY,SUBMISSION_NOTIFY_EMAIL,SUBMISSION_FROM_EMAIL,CF_ACCESS_AUD,CF_ACCESS_TEAM_DOMAIN,REVIEWER_EMAILS
          script: |
            set -e
            cd /opt/cosmeticsbatch
            # A full Docker store can prevent even git fetch from writing. Log
            # the cause, then reclaim only unused Docker objects. Volumes and
            # the running production container remain untouched.
            echo "Disk usage before cleanup:"
            df -h /
            docker system df || true
            disk_percent="$(df --output=pcent / | tail -1 | tr -dc '0-9')"
            if [ "$disk_percent" -ge 85 ]; then
              docker system prune -af
            else
              echo "Disk usage is below 85%; keeping reusable Docker cache."
            fi
            echo "Disk usage after cleanup:"
            df -h /
            docker system df || true
            git pull --ff-only
            # deploy.sh owns the build args (read from .env.build on the VPS) and
            # the run flags. Inlining a partial `docker build` here once shipped a
            # production image with the analytics/AdSense ids missing, because
            # NEXT_PUBLIC_* are baked in at build time.
            SKIP_PULL=1 bash ./deploy.sh
