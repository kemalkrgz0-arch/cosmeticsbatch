name: Deploy to VPS

# Production deploys are owner-controlled and run only from the Actions tab.
on:
  workflow_dispatch:
    inputs:
      reclaim_shared_next_cache:
        description: Reclaim the verified oversized YerelAtlas Next.js cache
        required: false
        default: false
        type: boolean

# Never let two production deploys run at once.
concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: SSH build & restart on the VPS
        uses: appleboy/ssh-action@v1.2.0
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          SUBMISSION_NOTIFY_EMAIL: contact@cosmeticsbatch.com
          SUBMISSION_FROM_EMAIL: Cosmetics Batch <contact@cosmeticsbatch.com>
          CF_ACCESS_AUD: ${{ secrets.CF_ACCESS_AUD }}
          # Public tenant URL (not a credential). Keeping it explicit prevents
          # an accidentally blank secret from disabling origin validation.
          CF_ACCESS_TEAM_DOMAIN: https://calm-sun-fd60.cloudflareaccess.com
          REVIEWER_EMAILS: ${{ secrets.REVIEWER_EMAILS }}
          RECLAIM_SHARED_NEXT_CACHE: ${{ inputs.reclaim_shared_next_cache }}
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          port: ${{ secrets.SSH_PORT || 22 }}
          command_timeout: 30m
          envs: RESEND_API_KEY,SUBMISSION_NOTIFY_EMAIL,SUBMISSION_FROM_EMAIL,CF_ACCESS_AUD,CF_ACCESS_TEAM_DOMAIN,REVIEWER_EMAILS,RECLAIM_SHARED_NEXT_CACHE
          script: |
            set -e
            cd /opt/cosmeticsbatch
            # A full Docker store can prevent even git fetch from writing. Log
            # the cause, then reclaim only unused Docker objects. Volumes and
            # the running production container remain untouched.
            echo "Disk usage before cleanup:"
            df -h /
            docker system df || true
            disk_percent="$(df --output=pcent / | tail -1 | tr -dc '0-9')"
            if [ "$disk_percent" -ge 85 ]; then
              docker system prune -af
            else
              echo "Disk usage is below 85%; keeping reusable Docker cache."
            fi
            echo "Disk usage after cleanup:"
            df -h /
            docker system df || true
            echo "Active container writable-layer sizes:"
            docker ps --size --format 'table {{.Names}}\t{{.Size}}\t{{.Image}}' || true
            available_kb="$(df --output=avail / | tail -1 | tr -dc '0-9')"
            if [ "$available_kb" -lt 6291456 ]; then
              echo "Largest directories in oversized active containers (read-only diagnostic):"
              docker ps --size --format '{{.Names}} {{.Size}}' | while read -r container size _; do
                case "$size" in
                  *GB) docker exec "$container" sh -c 'du -x -h -d 2 / 2>/dev/null | sort -h | tail -25' || true ;;
                esac
              done
              if [ "${RECLAIM_SHARED_NEXT_CACHE:-false}" = "true" ] && docker inspect yerelatlas-app-1 >/dev/null 2>&1; then
                echo "YerelAtlas .next breakdown (read-only):"
                docker exec yerelatlas-app-1 sh -c 'du -x -h -d 2 /app/.next 2>/dev/null | sort -h | tail -30' || true
                shared_cache_kb="$(docker exec yerelatlas-app-1 sh -c 'du -sk /app/.next/cache 2>/dev/null | cut -f1' || true)"
                if [ "${shared_cache_kb:-0}" -ge 10485760 ]; then
                  echo "Reclaiming verified rebuildable cache: yerelatlas-app-1:/app/.next/cache"
                  docker exec yerelatlas-app-1 sh -c 'find /app/.next/cache -mindepth 1 -maxdepth 1 -exec rm -rf -- {} +'
                  available_kb="$(df --output=avail / | tail -1 | tr -dc '0-9')"
                  df -h /
                else
                  echo "Shared cache is absent or below the 10 GiB safety threshold; nothing removed."
                fi
              fi
            fi
            if [ "$available_kb" -lt 6291456 ]; then
              echo "Insufficient build headroom: at least 6 GiB free is required." >&2
              exit 1
            fi
            git pull --ff-only
            # deploy.sh owns the build args (read from .env.build on the VPS) and
            # the run flags. Inlining a partial `docker build` here once shipped a
            # production image with the analytics/AdSense ids missing, because
            # NEXT_PUBLIC_* are baked in at build time.
            SKIP_PULL=1 bash ./deploy.sh
